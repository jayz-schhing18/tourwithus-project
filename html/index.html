<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour</title>
    <link rel="stylesheet" href="../src/output.css">
</head>

<body>
    <header>
        <nav>
            <div
                class="inset-x-1.5 mx-auto w-full max-w-screen-md border border-gray-100 bg-blue-600 py-3 shadow backdrop-blur-lg md:top-6 md:rounded-lg lg:max-w-screen-lg">
                <div class="px-4">
                    <div class="flex items-center justify-between ">
                        <div class="flex text-white">
                            <h1>SeaWithAlex</h1>
                        </div>
                        <div class="hidden md:flex md:items-center md:justify-center md:gap-5 text-white">
                            <a aria-current="page"
                                class="inline-block rounded-lg px-2 py-1 text-sm font-medium  transition-all duration-200 hover:bg-blue-100 hover:text-gray-900"
                                href="#">Home</a>
                            <a class="inline-block rounded-lg px-2 py-1 text-sm font-medium  transition-all duration-200 hover:bg-gray-100 hover:text-gray-900"
                                href="#">About</a>
                            <a class="inline-block rounded-lg px-2 py-1 text-sm font-medium  transition-all duration-200 hover:bg-gray-100 hover:text-gray-900"
                                href="#">Pricing</a>
                            <a class="inline-block rounded-lg px-2 py-1 text-sm font-medium  transition-all duration-200 hover:bg-gray-100 hover:text-gray-900"
                                href="#">Contact</a>
                        </div>
                        <div class="flex items-center justify-end gap-3 ">

                            <a class="hidden items-center justify-center rounded-xl bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 transition-all duration-150 hover:bg-gray-50 sm:inline-flex"
                                href="/login">Sign up</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>

        <section>
            <div
                class="grid grid-cols-2 py-4  rounded-lg   transform transition-transform border-gray-200 border justify-between shadow-none">

                <div class="p-2 md:p-6 flex flex-col md:justify-between">
                    <h3 class="text-xl md:text-md font-bold md:mb-2 uppercase text-gray-700 leading-4 ">
                        ខេស្តេឡារសជាតិដើម
                    </h3>
                    <p class="pb-0 flex">
                        <span class="text-lg md:text-3xl font-bold text-pink-500">$4.89</span>
                        <span class="text-xs md:text-sm text-slate-900 line-through"><del>$6.99</del></span>
                    </p>
                    <h4 class="text-sm text-pink-500">ស៊ុតស្រស់និងទឹកដោះគោឆៅ</h4>
                </div>

                <img class="aspect-square h-20 md:h-40 object-cover rounded-lg"
                    src="https://www.i-escape.com/image/hotel/the-royal-sands/overview/323118.jpg"
                    alt="product image" />
            </div>
        </section>
    </main>

</body>

</html>
